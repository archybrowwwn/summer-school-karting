# Конфигурация трассы и маршал — справочные объекты (read-only).
# В API поле называется route (конфигурация трассы), instructor (маршал-инструктор).
# Ссылки: '#/components/schemas/...' — внутри файла; '../common/...' — на сквозные объекты.

components:
  schemas:
    RouteType:
      type: string
      description: Тип конфигурации трассы — новичковая (novice) или опытная (experienced).
      enum:
        - novice
        - experienced

    Geometry:
      description: Геометрия трассы для отрисовки линии на карте Яндекс.
      oneOf:
        - type: array
          description: Массив координат точек трассы.
          items:
            type: array
            description: Координата в виде пары [lat, lng].
            minItems: 2
            maxItems: 2
            items:
              type: number
        - type: string
          description: Закодированная полилиния (encoded polyline).

    Route:
      type: object
      description: >-
        Конфигурация трассы заезда (короткая новичковая / длинная опытная).
        Справочник, доступен только для чтения.
      required:
        - id
        - name
        - type
        - capacity_cap
        - duration_min
        - geometry
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор конфигурации трассы.
        name:
          type: string
          description: Название конфигурации трассы.
          example: Короткая новичковая
        description:
          type: string
          nullable: true
          description: >-
            Описательный текст конфигурации / заезда для карточки слота (SCR-003).
            Опционально; может отсутствовать или быть null.
          example: >-
            Короткая конфигурация для новичков: часть картов с ограничением скорости,
            маршал ведёт брифинг перед стартом.
        type:
          $ref: '#/components/schemas/RouteType'
        capacity_cap:
          type: integer
          description: Потолок числа мест на трассе. Новичковая — не более 8, опытная — не более 14.
          example: 8
        duration_min:
          type: integer
          description: Продолжительность заезда в минутах (обычно 15–20, включая инструктаж).
          example: 18
        geometry:
          $ref: '#/components/schemas/Geometry'

    Instructor:
      type: object
      description: Маршал-инструктор, ведущий заезд (брифинг и контроль безопасности).
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор маршала-инструктора.
        name:
          type: string
          description: Имя маршала-инструктора.
          example: Алексей

    InstructorListResponse:
      type: object
      description: Постраничный список маршалов-инструкторов (справочник для фильтра, BS-001).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы списка маршалов.
          items:
            $ref: '#/components/schemas/Instructor'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'